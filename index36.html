<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반도체 직무 매칭 로드맵 생성기</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #0056b3;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #004494;
        }
        #result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #eef5ff;
            border-left: 5px solid #0056b3;
            border-radius: 5px;
            display: none;
        }
        .roadmap-list {
            margin-top: 10px;
            padding-left: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 반도체 직무 매칭기</h2>
    
    <label for="major">자신의 전공을 선택하세요:</label>
    <select id="major">
        <option value="electronic">전자/전기공학</option>
        <option value="material">신소재/화학공학</option>
        <option value="mechanical">기계공학</option>
        <option value="other">기타 이공계/인문계</option>
    </select>

    <label for="interest">가장 흥미 있는 분야는 무엇인가요?</label>
    <select id="interest">
        <option value="design">논리적 설계 및 시뮬레이션</option>
        <option value="experiment">실험, 분석 및 원인 규명</option>
        <option value="equipment">기계/장비 유지보수 및 제어</option>
        <option value="manage">데이터 분석 및 품질/일정 관리</option>
    </select>

    <button onclick="generateRoadmap()">로드맵 생성하기</button>

    <div id="result-box">
        <h3 id="job-title" style="color: #0056b3; margin-top: 0;"></h3>
        <p id="job-desc"></p>
        <strong>📚 추천 준비 로드맵:</strong>
        <ul id="roadmap-items" class="roadmap-list"></ul>
    </div>
</div>

<script>
    function generateRoadmap() {
        const major = document.getElementById("major").value;
        const interest = document.getElementById("interest").value;
        
        let jobTitle = "";
        let jobDesc = "";
        let roadmap = [];

        // 로직: 전공과 관심사를 조합하여 직무 매칭
        if (major === "electronic" && interest === "design") {
            jobTitle = "회로 설계 (Circuit Design) 엔지니어";
            jobDesc = "반도체 칩의 논리/물리적 회로를 설계하고 검증하는 핵심 직무입니다.";
            roadmap = [
                "디지털/아날로그 회로 이론 완벽 숙지",
                "Verilog, C언어 등 프로그래밍 역량 강화",
                "FPGA 보드를 활용한 미니 프로젝트 진행",
                "반도체 설계 툴(EDA) 사용 경험 쌓기"
            ];
        } else if ((major === "material" || major === "electronic") && interest === "experiment") {
            jobTitle = "공정 엔지니어 (Process Engineer)";
            jobDesc = "8대 공정의 효율성을 높이고 불량 원인을 찾아 수율을 개선하는 직무입니다.";
            roadmap = [
                "반도체 8대 공정 및 소자(Device) 물리 이해",
                "통계적 공정 관리(SPC) 및 데이터 분석 역량 학습",
                "학부 연구생 실험 또는 공정 실습 교육 수료",
                "문제 해결 및 원인 분석(Troubleshooting) 경험 정리"
            ];
        } else if (major === "mechanical" || interest === "equipment") {
            jobTitle = "설비 엔지니어 (Equipment Engineer)";
            jobDesc = "수천억 원대 반도체 장비를 셋업하고 최적의 상태로 유지보수하는 직무입니다.";
            roadmap = [
                "기계, 전자, 제어 공학의 기초 역량 융합",
                "PLC 제어 및 장비 도면 이해 능력 향상",
                "교대 근무를 견딜 수 있는 강한 체력과 책임감 어필",
                "장비 이상 발생 시 대처했던 문제 해결 사례 준비"
            ];
        } else {
            jobTitle = "품질 보증 (Quality Assurance / QA)";
            jobDesc = "고객에게 출하되기 전 제품의 신뢰성을 검증하고 품질을 책임지는 직무입니다.";
            roadmap = [
                "식스시그마(6-Sigma), 품질경영기사 등 관련 자격증 취득",
                "파이썬(Python), SQL 등을 활용한 빅데이터 분석 능력",
                "소통 및 협업 역량을 보여주는 팀 프로젝트 경험",
                "제품 불량 분석(FA) 방법론 학습"
            ];
        }

        // 결과 화면에 출력
        document.getElementById("job-title").innerText = "✨ 추천 직무: " + jobTitle;
        document.getElementById("job-desc").innerText = jobDesc;
        
        const ul = document.getElementById("roadmap-items");
        ul.innerHTML = ""; // 기존 리스트 초기화
        roadmap.forEach(item => {
            let li = document.createElement("li");
            li.innerText = item;
            ul.appendChild(li);
        });

        document.getElementById("result-box").style.display = "block";
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 복약 매니저</title>
    <!-- [기존 스타일 유지] -->
    <style>
        :root { --primary-color: #4A90E2; --success-color: #2ECC71; --alert-color: #E74C3C; --bg-color: #F0F4F8; --card-bg: #FFFFFF; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); position: relative; }
        h1 { text-align: center; color: #1E293B; font-size: 26px; margin-bottom: 5px; font-weight: 800; }
        .streak-banner { background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%); color: #fff; padding: 18px; border-radius: 16px; text-align: center; font-weight: bold; font-size: 20px; margin-bottom: 25px; box-shadow: 0 6px 20px rgba(255, 107, 107, 0.3); }
        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; background: #F8FAFC; padding: 20px; border-radius: 16px; border: 1px solid #E2E8F0; }
        .input-row { display: flex; gap: 10px; }
        .input-row input { flex: 1; }
        .input-group input, .input-group select { padding: 12px; border: 1px solid #CBD5E1; border-radius: 10px; font-size: 14px; background: #FFF; }
        .input-group button { background-color: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .med-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .med-card { border: 1px solid #E2E8F0; padding: 18px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; background: #FFF; }
        .med-card.taken { border-color: #E2E8F0; background-color: #F8FAFC; opacity: 0.6; }
        .med-card.taken h3 { text-decoration: line-through; color: #94A3B8; }
        .time-tag { background-color: #E2E8F0; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; color: #475569; }
        .btn-group { display: flex; gap: 6px; }
        .btn-action { border: none; padding: 10px 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-take { background-color: var(--success-color); color: white; }
        .btn-delete { background-color: #FFE4E6; color: var(--alert-color); }
        .calendar-section { background: #F8FAFC; padding: 20px; border-radius: 16px; border: 1px solid #E2E8F0; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .calendar-cell { background: #FFF; border: 1px solid #E2E8F0; border-radius: 8px; height: 45px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; }
        .calendar-cell.today { border-color: var(--primary-color); background-color: #EFF6FF; }
        .fire-stamp { font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h1>💊 스마트 복약 관리</h1>
    <p style="text-align: center; color: #64748B; font-size: 14px;">현재 시간: <span id="current-clock" style="font-weight: bold;">00:00:00</span></p>
    
    <div class="streak-banner">🔥 연속 <span id="streak-count">0</span>일 달성! 대단해요!</div>

    <div class="input-group">
        <input type="hidden" id="med-id">
        <input type="text" id="med-name" placeholder="약 이름">
        <div class="input-row">
            <input type="number" id="med-dosage" placeholder="량">
            <select id="med-unit"><option value="정">정</option><option value="g">g</option></select>
            <input type="time" id="med-time">
        </div>
        <button id="btn-submit" onclick="submitForm()">+ 새로운 복용 일정 추가</button>
        <button id="btn-cancel-edit" onclick="resetForm()" style="display:none; background-color:#64748B; margin-top:5px; color:white; border:none; padding:10px; border-radius:10px; cursor:pointer;">수정 취소</button>
    </div>

    <div class="med-list" id="med-list"></div>

    <div class="calendar-section">
        <div style="font-weight:bold; margin-bottom:15px; text-align:center;">🗓️ 이번 주 복약 기록 현황</div>
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>
</div>

<script>
    let meds = JSON.parse(localStorage.getItem('meds')) || [];
    let history = JSON.parse(localStorage.getItem('history')) || {};

    // 시간 표시
    setInterval(() => {
        document.getElementById('current-clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    function render() {
        const list = document.getElementById('med-list');
        list.innerHTML = '';
        meds.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = `med-card ${m.taken ? 'taken' : ''}`;
            card.innerHTML = `<div><h3>${m.name} <span class="time-tag">${m.time}</span></h3>
                <p style="margin:0; font-size:14px;">복용량: ${m.dosage}${m.unit}</p></div>
                <div class="btn-group">
                    <button class="btn-action btn-take" onclick="toggleMed(${i})">${m.taken ? '완료' : '복용 확인'}</button>
                    <button class="btn-action" onclick="editMed(${i})" style="background:#E2E8F0;">수정</button>
                    <button class="btn-action btn-delete" onclick="deleteMed(${i})">삭제</button>
                </div>`;
            list.appendChild(card);
        });
        updateStreak();
        renderCalendar();
    }

    function submitForm() {
        const id = document.getElementById('med-id').value;
        const name = document.getElementById('med-name').value;
        const dosage = document.getElementById('med-dosage').value;
        const unit = document.getElementById('med-unit').value;
        const time = document.getElementById('med-time').value;

        if(!name || !dosage || !time) return alert('모든 칸을 입력해 주세요.');
        
        if (id === "") {
            meds.push({ name, dosage, unit, time, taken: false });
        } else {
            meds[id] = { name, dosage, unit, time, taken: meds[id].taken };
        }
        localStorage.setItem('meds', JSON.stringify(meds));
        resetForm();
        render();
    }

    function toggleMed(i) {
        meds[i].taken = !meds[i].taken;
        const today = new Date().toISOString().split('T')[0];
        history[today] = meds.every(m => m.taken);
        localStorage.setItem('meds', JSON.stringify(meds));
        localStorage.setItem('history', JSON.stringify(history));
        render();
    }

    function deleteMed(i) {
        if(!confirm('정말 삭제하시겠습니까?')) return;
        meds.splice(i, 1);
        localStorage.setItem('meds', JSON.stringify(meds));
        render();
    }

    function editMed(i) {
        document.getElementById('med-id').value = i;
        document.getElementById('med-name').value = meds[i].name;
        document.getElementById('med-dosage').value = meds[i].dosage;
        document.getElementById('med-unit').value = meds[i].unit;
        document.getElementById('med-time').value = meds[i].time;
        document.getElementById('btn-submit').innerText = '✓ 일정 수정 완료';
        document.getElementById('btn-cancel-edit').style.display = 'block';
    }

    function resetForm() {
        document.getElementById('med-id').value = '';
        document.getElementById('med-name').value = '';
        document.getElementById('med-dosage').value = '';
        document.getElementById('med-time').value = '';
        document.getElementById('btn-submit').innerText = '+ 새로운 복용 일정 추가';
        document.getElementById('btn-cancel-edit').style.display = 'none';
    }

    function updateStreak() {
        let count = 0;
        let d = new Date();
        while (history[d.toISOString().split('T')[0]]) {
            count++;
            d.setDate(d.getDate() - 1);
        }
        document.getElementById('streak-count').innerText = count;
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        const today = new Date();
        for(let i=0; i<7; i++) {
            let d = new Date(); d.setDate(today.getDate() - today.getDay() + i);
            let ds = d.toISOString().split('T')[0];
            grid.innerHTML += `<div class="calendar-cell ${ds === today.toISOString().split('T')[0] ? 'today':''}">
                ${d.getDate()}<br>${history[ds] ? '<span class="fire-stamp">🔥</span>' : ''}</div>`;
        }
    }

    render();
</script>
</body>
</html>

          { id: 81, name: "파록세틴 (Paroxetine)", category: "항우울제 (SSRI)", timing: "아침 식후 즉시", dosage: "20-50mg 1일 1회", interactions: ["피모짓", "타목시펜"], sideEffects: ["체중 증가", "졸음", "금단 증상"], contraindications: ["임산부"] },

          { id: 87, name: "아모시실린/클라불란산 (Amoxicillin/Clavulanate)", category: "페니실린계 복합 항생제", timing: "식사 시작 전 또는 식사 직후", dosage: "375-625mg 1일 3회", interactions: ["항응고제", "메토트렉세이트"], sideEffects: ["설사", "질 진균 감염"], contraindications: ["이전 동 약물로 인한 간장애 환자"] },
          { id: 88, name: "세파클러 (Cefaclor)", category: "세팔로스포린계 항생제 (2세대)", timing: "8시간 간격 식후 복용", dosage: "250-500mg 1일 3회", interactions: ["제산제", "프로베네시드"], sideEffects: ["설사", "피부 소양증"], contraindications: ["세파계 항생제 과민증 환자"] },
          { id: 89, name: "세프디토렌 피복실 (Cefditoren)", category: "세팔로스포린계 항생제 (3세대)", timing: "식후 복용", dosage: "100-200mg 1일 3회", interactions: ["제산제", "H2차단제"], sideEffects: ["설사", "오심"], contraindications: ["카르니틴 결핍증 환자"] },
          { id: 90, name: "레보플록사신 (Levofloxacin)", category: "퀴놀론계 항생제", timing: "식사 무관 일정 시간 (물과 복용)", dosage: "250-500mg 1일 1회", interactions: ["제산제", "철분제", "NSAIDs"], sideEffects: ["아킬레스건염 위험", "광과민성"], contraindications: ["18세 미만 소아 및 청소년", "임산부"] },
          { id: 91, name: "클라리스로마이신 (Clarithromycin)", category: "마크로라이드계 항생제", timing: "식후 복용", dosage: "250-500mg 1일 2회", interactions: ["아토르바스타틴", "로수바스타틴", "디곡신"], sideEffects: ["금속성 미각", "설사"], contraindications: ["피모짓 병용 환자"] },
          { id: 92, name: "아지스로마이신 (Azithromycin)", category: "마크로라이드계 항생제", timing: "정제는 식사 무관 / 캡슐제는 식전 공복", dosage: "250-500mg 1일 1회", interactions: ["제산제", "와파린"], sideEffects: ["설사", "구토"], contraindications: ["맥각 알칼로이드 병용 환자"] },
          { id: 93, name: "오셀타미비르 (Oseltamivir)", category: "독감 치료제", timing: "12시간 간격 5일간 복용", dosage: "75mg 1일 2회", interactions: [], sideEffects: ["구토", "오심", "이상행동 모니터링 필요"], contraindications: ["이 약 과민증 환자"] },
          { id: 94, name: "아시클로버 (Acyclovir)", category: "항바이러스제", timing: "일정 간격 식사 무관", dosage: "200-800mg 1일 4~5회", interactions: ["프로베네시드", "시메티딘"], sideEffects: ["신장 독성", "두통"], contraindications: ["이 약 성분에 중증 과민증 환자"] },
          { id: 95, name: "플루코나졸 (Fluconazole)", category: "항진균제", timing: "식사 무관 일정 시간", dosage: "50-150mg 1일 1회", interactions: ["아토르바스타틴", "로수바스타틴", "와파린", "세레콕시브"], sideEffects: ["간수치 상승", "피부 발진"], contraindications: ["QT 연장 약물 병용 환자"] },
          { id: 96, name: "탐스로신 염산염 (Tamsulosin)", category: "전립선비대증 치료제", timing: "아침 식후 일정 시간", dosage: "0.2-0.4mg 1일 1회", interactions: ["다른 혈압약"], sideEffects: ["기립성 저혈압", "어지러움"], contraindications: ["중증 간기능 장애 환자"] },
          { id: 97, name: "피나스테리드 (Finasteride)", category: "탈모/전립선비대증 치료제", timing: "매일 일정하게", dosage: "1mg", interactions: [], sideEffects: ["성욕 감퇴", "발기 부전"], contraindications: ["임산부 및 가임기 여성"] },
          { id: 98, name: "오메가-3 지방산 에스테르 (Omega-3)", category: "건강기능식품", timing: "식후 즉시 복용", dosage: "1-4g 1일 1~2회", interactions: ["아스피린", "클로피도그렐", "리바록사반", "아피사반", "와파린"], sideEffects: ["소화불량", "생선 냄새 트림"], contraindications: ["생선 과민증 환자"] },
          { id: 99, name: "콜레칼시페롤 (Vit D3)", category: "건강기능식품", timing: "식후 즉시 복용", dosage: "1000-5000IU 1일 1회", interactions: ["제산제"], sideEffects: ["고칼슘혈증 (과량 복용 시)"], contraindications: ["고칼슘혈증 환자"] },
          { id: 100, name: "아스코르브산 (Vit C)", category: "건강기능식품", timing: "식후 즉시", dosage: "500-2000mg 1일 1~2회", interactions: ["와파린"], sideEffects: ["위통", "설사 (과량 복용 시)"], contraindications: ["신장결석 기왕력자"] }
        ];

        // 상태 변수: 내 약 상자에 등록된 약물 ID 배열
        let myMeds = [];

        // DOM 로드 완료 시 초기 화면 렌더링
        document.addEventListener("DOMContentLoaded", () => {
            filterDrugs();
            updateMyMedsUI();
        });

        // 1. 다중 조건 의약품 실시간 검색 및 필터링
        function filterDrugs() {
            const query = document.getElementById("searchInput").value.toLowerCase().trim();
            const filtered = drugDatabase.filter(drug => 
                drug.name.toLowerCase().includes(query) || 
                drug.category.toLowerCase().includes(query) ||
                (drug.sideEffects && drug.sideEffects.some(se => se.toLowerCase().includes(query)))
            );

            document.getElementById("resultCount").innerText = `${filtered.length}개`;
            renderDrugList(filtered);
        }

        // 2. 검색창 아래 검색 목록 렌더링
        function renderDrugList(drugs) {
            const container = document.getElementById("drugList");
            container.innerHTML = "";

            if (drugs.length === 0) {
                container.innerHTML = `
                    <div class="p-12 text-center text-slate-400 text-sm">
                        <i class="fa-solid fa-folder-open text-4xl mb-3 text-slate-300 block"></i>
                        해당 조건으로 등록된 약물이 존재하지 않습니다.
                    </div>`;
                return;
            }

            drugs.forEach(drug => {
                const isAdded = myMeds.includes(drug.id);
                const item = document.createElement("div");
                item.className = "p-5 hover:bg-slate-50 transition flex justify-between items-start gap-4";
                item.innerHTML = `
                    <div class="space-y-2 flex-1">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="font-bold text-slate-800 text-base">${drug.name}</span>
                            <span class="bg-emerald-50 text-emerald-700 border border-emerald-100 text-[11px] px-2.5 py-0.5 rounded-full font-semibold">${drug.category}</span>
                        </div>
                        <div class="text-xs text-slate-500 space-y-1">
                            <p><strong><i class="fa-regular fa-clock mr-1"></i> 복용 스케줄:</strong> ${drug.timing} (${drug.dosage})</p>
                            <p><strong><i class="fa-solid fa-triangle-exclamation mr-1 text-red-400"></i> 이상 반응:</strong> ${drug.sideEffects.join(", ")}</p>
                            ${drug.contraindications && drug.contraindications.length > 0 ? `<p class="text-rose-600 font-medium"><strong><i class="fa-solid fa-ban mr-1"></i> 투여 금기:</strong> ${drug.contraindications.join(", ")}</p>` : ''}
                        </div>
                    </div>
                    <div>
                        <button onclick="toggleMed(${drug.id})" 
                            class="w-10 h-10 rounded-xl flex items-center justify-center transition-all ${
                                isAdded 
                                ? 'bg-rose-50 hover:bg-rose-100 text-rose-600 border border-rose-200 shadow-sm' 
                                : 'bg-emerald-50 hover:bg-emerald-100 text-emerald-600 border border-emerald-200 shadow-sm'
                            }"
                            title="${isAdded ? '내 약 상자에서 제거' : '내 약 상자에 추가'}">
                            <i class="fa-solid ${isAdded ? 'fa-minus' : 'fa-plus'}"></i>
                        </button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // 3. 내 약 상자 온/오프 토글 함수
        function toggleMed(id) {
            const index = myMeds.indexOf(id);
            if (index > -1) {
                myMeds.splice(index, 1);
            } else {
                myMeds.push(id);
            }
            updateMyMedsUI();
            filterDrugs(); // 목록 버튼 상태 연계 동기화
        }

        // 4. 내 약 상자 렌더링 동적 업데이트
        function updateMyMedsUI() {
            const container = document.getElementById("myMedsContainer");
            document.getElementById("myMedCount").innerText = `${myMeds.length}개`;
            container.innerHTML = "";

            if (myMeds.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-slate-400 text-sm py-8 border-2 border-dashed border-slate-200 rounded-xl">
                        <i class="fa-solid fa-prescription-bottle text-3xl mb-2.5 block text-slate-300"></i>
                        추가된 약물이 없습니다.<br><span class="text-xs text-slate-400">약물 검색 후 [+] 버튼을 눌러보세요.</span>
                    </div>`;
                runInteractionAnalysis();
                return;
            }

            myMeds.forEach(id => {
                const drug = drugDatabase.find(d => d.id === id);
                if (drug) {
                    const card = document.createElement("div");
                    card.className = "p-3.5 bg-slate-50 border border-slate-200 rounded-xl flex justify-between items-center hover:border-slate-300 transition-all";
                    card.innerHTML = `
                        <div class="flex-1 min-w-0 pr-2">
                            <p class="font-bold text-sm text-slate-800 truncate">${drug.name}</p>
                            <p class="text-[11px] text-slate-500 truncate">${drug.category}</p>
                        </div>
                        <button onclick="toggleMed(${drug.id})" class="text-slate-400 hover:text-rose-600 transition p-1.5" title="제거">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    `;
                    container.appendChild(card);
                }
            });

            runInteractionAnalysis();
        }

        // 5. 교차 약물 및 식품 필터링 실시간 알고리즘
        function runInteractionAnalysis() {
            const container = document.getElementById("analysisContainer");
            container.innerHTML = "";

            if (myMeds.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-slate-400 text-xs py-10 bg-slate-50 border border-slate-200 border-dashed rounded-xl">
                        분석 대상 약물이 없습니다.
                    </div>`;
                return;
            }

            const activeDrugs = myMeds.map(id => drugDatabase.find(d => d.id === id)).filter(Boolean);
            const warnings = [];

            // 크로스체킹 루프
            for (let i = 0; i < activeDrugs.length; i++) {
                const drugA = activeDrugs[i];

                // A. 특정 외부인자(식품, 알코올 등) 경고 로직
                const foodInteractions = drugA.interactions.filter(item => ["자몽주스", "알코올", "비타민 K 식품"].includes(item));
                foodInteractions.forEach(food => {
                    warnings.push({
                        type: 'food',
                        title: `⚠️ 복용 주의 (${drugA.name.split(' ')[0]})`,
                        desc: `이 약은 <strong>${food}</strong>와(과) 함께 대사될 때 부작용 가능성이 커집니다. 복용 중 섭취를 중단하거나 주의해 주세요.`
                    });
                });

                // B. 복용 약물 상호 교차작용 매칭
                for (let j = i + 1; j < activeDrugs.length; j++) {
                    const drugB = activeDrugs[j];

                    // 상호작용 매칭 규칙 (이름, 분류, 대표 수식어)
                    const checkAtoB = drugA.interactions.some(inter => 
                        drugB.name.toLowerCase().includes(inter.toLowerCase()) || 
                        drugB.category.toLowerCase().includes(inter.toLowerCase()) ||
                        (inter === "NSAIDs" && drugB.category.includes("NSAIDs"))
                    );

                    const checkBtoA = drugB.interactions.some(inter => 
                        drugA.name.toLowerCase().includes(inter.toLowerCase()) || 
                        drugA.category.toLowerCase().includes(inter.toLowerCase()) ||
                        (inter === "NSAIDs" && drugA.category.includes("NSAIDs"))
                    );

                    if (checkAtoB || checkBtoA) {
                        warnings.push({
                            type: 'danger',
                            title: `🚫 병용 금기 위험 (${drugA.name.split(' ')[0]} ↔ ${drugB.name.split(' ')[0]})`,
                            desc: `<strong>${drugA.name.split(' ')[0]}</strong>와(과) <strong>${drugB.name.split(' ')[0]}</strong>은(는) 동시 복용 시 약리 반응을 저해하거나, 이상반응 빈도를 높일 수 있으므로 동시 처방을 금합니다.`
                        });
                    }
                }
            }

            // 분석 리포트 화면 반영
            if (warnings.length === 0) {
                container.innerHTML = `
                    <div class="p-5 bg-emerald-50 border border-emerald-200 rounded-xl flex items-center gap-3 text-emerald-800">
                        <i class="fa-solid fa-circle-check text-2xl text-emerald-600"></i>
                        <div class="text-xs">
                            <p class="font-bold text-sm text-emerald-900">병용 위험 분석 안전</p>
                            <p class="text-emerald-700 mt-1 leading-relaxed">내 약 상자에 구성된 약물 간의 상호 위험 요소가 확인되지 않았습니다.</p>
                        </div>
                    </div>`;
            } else {
                warnings.forEach(warn => {
                    const warnDiv = document.createElement("div");
                    const isFood = warn.type === 'food';
                    warnDiv.className = `p-4 border rounded-xl flex items-start gap-3 transition-all ${
                        isFood 
                        ? 'bg-amber-50 border-amber-200 text-amber-900 shadow-sm' 
                        : 'bg-rose-50 border-rose-200 text-rose-900 shadow-sm'
                    }`;
                    warnDiv.innerHTML = `
                        <i class="fa-solid ${isFood ? 'fa-triangle-exclamation text-amber-500' : 'fa-circle-xmark text-rose-600'} text-lg mt-0.5"></i>
                        <div class="text-xs space-y-1">
                            <p class="font-bold text-sm ${isFood ? 'text-amber-950' : 'text-rose-950'}">${warn.title}</p>
                            <p class="leading-relaxed">${warn.desc}</p>
                        </div>
                    `;
                    container.appendChild(warnDiv);
                });
            }
        }
    </script>
</body>
